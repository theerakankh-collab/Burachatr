<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>โปรแกรมจัดผังต้อนรับ บก.ส.1 (12 ผังพื้นที่)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { touch-action: none; overflow: hidden; }
        .draggable { touch-action: none; position: absolute; cursor: move; }
    </style>
</head>
<body class="bg-slate-100 w-screen h-screen flex flex-col p-4 font-sans select-none">

    <div class="bg-white p-4 rounded-xl shadow-sm mb-3 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 shrink-0">
        <div>
            <h1 id="layout-title" class="text-lg font-bold text-gray-800">ผังการต้อนรับ บริเวณ หน้า บก.ส.1 (ผังที่ 1)</h1>
            <p class="text-xs text-gray-500">เลือกผังที่ต้องการจากเมนูด้านขวา (รองรับ 12 ผัง) ลากวางบล็อกสี่เหลี่ยมเพื่อจัดตำแหน่งได้อิสระ</p>
        </div>
        
        <div class="flex items-center gap-2 w-full sm:w-auto">
            <label for="layout-select" class="text-xs font-bold text-gray-600 whitespace-nowrap">📍 เลือกพื้นที่:</label>
            <select id="layout-select" onchange="switchLayout(this.value)" class="bg-slate-50 border border-gray-300 text-gray-800 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full sm:w-56 p-2 font-semibold">
                <option value="area1">ผังที่ 1 (หน้า บก.ส.1)</option>
                <option value="area2">ผังที่ 2</option>
                <option value="area3">ผังที่ 3</option>
                <option value="area4">ผังที่ 4</option>
                <option value="area5">ผังที่ 5</option>
                <option value="area6">ผังที่ 6</option>
                <option value="area7">ผังที่ 7</option>
                <option value="area8">ผังที่ 8</option>
                <option value="area9">ผังที่ 9</option>
                <option value="area10">ผังที่ 10</option>
                <option value="area11">ผังที่ 11</option>
                <option value="area12">ผังที่ 12</option>
            </select>
        </div>
    </div>

    <div id="canvas" class="flex-1 bg-white border border-gray-200 rounded-2xl relative overflow-hidden shadow-inner">
        <div class="absolute inset-0 bg-[linear-gradient(to_right,#f1f5f9_1px,transparent_1px),linear-gradient(to_bottom,#f1f5f9_1px,transparent_1px)] bg-[size:20px_20px]"></div>
    </div>

    <div class="mt-3 p-3 bg-white rounded-xl shadow-sm flex gap-3 justify-center shrink-0 z-50">
        <button onclick="exportToPNG()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium text-sm px-5 py-2 rounded-lg shadow-sm active:scale-95 transition-transform flex items-center gap-2">
            📷 บันทึกผังนี้เป็นรูปภาพ (PNG)
        </button>
        <button onclick="resetCurrentLayout()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium text-sm px-5 py-2 rounded-lg active:scale-95 transition-transform">
            🔄 รีเซ็ตผังนี้ใหม่
        </button>
    </div>

    <script>
        // ข้อมูลกำลังพลชุดเริ่มต้น (ใช้เป็นค่า Default สำหรับผังเปล่า)
        const defaultPersonnelList = [
            { id: '10', name: 'ผบ.พัน.นร.รร.ส.สส.', color: 'bg-[#00a2e8]', x: 620, y: 40 },
            { id: '9', name: 'ผบ.พัน.ส.ชบช.เขตหลัง', color: 'bg-[#00a2e8]', x: 620, y: 100 },
            { id: '8', name: 'เสธ.ส.1', color: 'bg-[#00a2e8]', x: 620, y: 160 },
            { id: '7', name: 'หก.กผสป.สส.', color: 'bg-[#00a2e8]', x: 620, y: 220 },
            { id: '6', name: 'ผบ.ส.1 พัน.101', color: 'bg-[#00a2e8]', x: 620, y: 280 },
            { id: '5', name: 'ผบ.ส.1 พัน.102', color: 'bg-[#00a2e8]', x: 620, y: 340 },
            { id: '4', name: 'รอง ผบ.ส.1(2)', color: 'bg-[#00a2e8]', x: 620, y: 400 },
            { id: '3', name: 'รอง ผบ.ส.1(1)', color: 'bg-[#00a2e8]', x: 620, y: 460 },
            { id: '2', name: 'ผบ.ส.1', color: 'bg-[#00a2e8]', x: 300, y: 460 },
            { id: '9', name: 'คุณภัสร์ชลีรณณ์(แอมป์)', color: 'bg-[#ff3399]', isPink: true, x: 400, y: 100 },
            { id: '8', name: 'น.ท.หญิงจุฑามาศ', color: 'bg-[#ff3399]', isPink: true, x: 400, y: 160 },
            { id: '7', name: 'คุณเกวลิน(เกว)', color: 'bg-[#ff3399]', isPink: true, x: 400, y: 220 },
            { id: '6', name: 'คุณกฤตพร(แพร)', color: 'bg-[#ff3399]', isPink: true, x: 400, y: 280 },
            { id: '5', name: 'คุณอังคนา(มุ่ย)', color: 'bg-[#ff3399]', isPink: true, x: 400, y: 340 },
            { id: '4', name: 'คุณกฤตานนดา(ฝน)', color: 'bg-[#ff3399]', isPink: true, x: 400, y: 400 },
            { id: '3', name: 'คุณศรินทรา(แก้ว)', color: 'bg-[#ff3399]', isPink: true, x: 400, y: 460 },
            { id: '2', name: 'คุณพัชมณฑ์(น้ำหวาน)', color: 'bg-[#ff3399]', isPink: true, x: 80, y: 460 },
            { id: '1', name: 'นายทหารเวร ส.1', color: 'bg-[#70c14a]', x: 300, y: 520 },
            { id: '', name: 'คุณจารุวรรณ(พี่หนิง)', color: 'bg-[#bc00dd]', isPurple: true, x: 300, y: 590 }
        ];

        // 1. คลังข้อมูลรองรับครบ 12 ผัง (ผังที่ 1 ล็อกพิกัดตามรูปเดิม ส่วนผังที่ 2-12 ตั้งค่าเริ่มต้นไว้ให้ลากวางใหม่)
        const layoutsData = {
            area1: { title: "ผังการต้อนรับ บริเวณ หน้า บก.ส.1 (ผังที่ 1)", personnel: JSON.parse(JSON.stringify(defaultPersonnelList)) },
            area2: { title: "พื้นที่จัดผังที่ 2", personnel: JSON.parse(JSON.stringify(defaultPersonnelList)) },
            area3: { title: "พื้นที่จัดผังที่ 3", personnel: JSON.parse(JSON.stringify(defaultPersonnelList)) },
            area4: { title: "พื้นที่จัดผังที่ 4", personnel: JSON.parse(JSON.stringify(defaultPersonnelList)) },
            area5: { title: "พื้นที่จัดผังที่ 5", personnel: JSON.parse(JSON.stringify(defaultPersonnelList)) },
            area6: { title: "พื้นที่จัดผังที่ 6", personnel: JSON.parse(JSON.stringify(defaultPersonnelList)) },
            area7: { title: "พื้นที่จัดผังที่ 7", personnel: JSON.parse(JSON.stringify(defaultPersonnelList)) },
            area8: { title: "พื้นที่จัดผังที่ 8", personnel: JSON.parse(JSON.stringify(defaultPersonnelList)) },
            area9: { title: "พื้นที่จัดผังที่ 9", personnel: JSON.parse(JSON.stringify(defaultPersonnelList)) },
            area10: { title: "พื้นที่จัดผังที่ 10", personnel: JSON.parse(JSON.stringify(defaultPersonnelList)) },
            area11: { title: "พื้นที่จัดผังที่ 11", personnel: JSON.parse(JSON.stringify(defaultPersonnelList)) },
            area12: { title: "พื้นที่จัดผังที่ 12", personnel: JSON.parse(JSON.stringify(defaultPersonnelList)) }
        };

        let currentLayoutKey = 'area1';
        const canvas = document.getElementById('canvas');
        const layoutTitleElement = document.getElementById('layout-title');

        // 2. ฟังก์ชันวาดและควบคุมวัตถุบนกระดาน
        function renderLayout(layoutKey) {
            canvas.querySelectorAll('.draggable').forEach(el => el.remove());
            
            const currentLayout = layoutsData[layoutKey];
            layoutTitleElement.innerText = currentLayout.title;

            currentLayout.personnel.forEach(person => {
                const container = document.createElement('div');
                container.className = 'draggable flex items-center gap-3 select-none z-10';
                container.style.left = person.x + 'px';
                container.style.top = person.y + 'px';

                const square = document.createElement('div');
                square.className = `w-10 h-10 rounded-xl ${person.color} text-white flex items-center justify-center font-bold shadow-md text-sm shrink-0`;
                square.innerText = person.id;

                const label = document.createElement('div');
                label.className = 'bg-white/90 backdrop-blur-xs px-3 py-1.5 rounded-lg shadow-sm border border-gray-200 text-xs font-bold text-gray-800 whitespace-nowrap';
                label.innerText = person.name;

                if (person.isPink) {
                    container.appendChild(label);
                    container.appendChild(square);
                } else {
                    container.appendChild(square);
                    container.appendChild(label);
                }

                canvas.appendChild(container);

                // ระบบลากวาง (Drag & Drop) สำหรับหน้าจอสัมผัส iPad / โทรศัพท์มือถือ
                let isDragging = false;
                let startX, startY;

                function startDrag(e) {
                    isDragging = true;
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                    
                    startX = clientX - container.offsetLeft;
                    startY = clientY - container.offsetTop;
                    container.style.zIndex = 50; 
                }

                function doDrag(e) {
                    if (!isDragging) return;
                    e.preventDefault();
                    
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                    
                    let newX = clientX - startX;
                    let newY = clientY - startY;

                    const maxW = canvas.clientWidth - container.clientWidth;
                    const maxH = canvas.clientHeight - container.clientHeight;
                    newX = Math.max(10, Math.min(newX, maxW - 10));
                    newY = Math.max(10, Math.min(newY, maxH - 10));

                    container.style.left = newX + 'px';
                    container.style.top = newY + 'px';
                    
                    // บันทึกค่าตำแหน่งพิกัดลงในผังพื้นที่นั้นๆ ชั่วคราว
                    person.x = newX;
                    person.y = newY;
                }

                function stopDrag() {
                    isDragging = false;
                    container.style.zIndex = 10;
                }

                container.addEventListener('mousedown', startDrag);
                document.addEventListener('mousemove', doDrag);
                document.addEventListener('mouseup', stopDrag);

                container.addEventListener('touchstart', startDrag, { passive: false });
                document.addEventListener('touchmove', doDrag, { passive: false });
                document.addEventListener('touchend', stopDrag);
            });
        }

        // 3. ฟังก์ชันสลับผัง
        function switchLayout(layoutKey) {
            currentLayoutKey = layoutKey;
            renderLayout(layoutKey);
        }

        // ฟังก์ชันสั่ง Export พื้นที่จัดผังเป็นรูปภาพ PNG
        function exportToPNG() {
            const uiHeader = document.querySelector('.shrink-0');
            const uiFooter = document.querySelector('.mt-3');
            
            uiHeader.style.visibility = 'hidden';
            uiFooter.style.visibility = 'hidden';
            
            html2canvas(document.body, { scale: 2 }).then(canvasImage => {
                const link = document.createElement('a');
                const titleText = layoutsData[currentLayoutKey].title;
                link.download = `${titleText}.png`;
                link.href = canvasImage.toDataURL('image/png');
                link.click();
                
                uiHeader.style.visibility = 'visible';
                uiFooter.style.visibility = 'visible';
            });
        }

        // รีเซ็ตผังปัจจุบัน
        function resetCurrentLayout() {
            location.reload();
        }

        // รันหน้าจอเริ่มต้น
        renderLayout(currentLayoutKey);
    </script>
</body>
</html>
