<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบบริหารจัดการผังต้อนรับ ส.1 (หน้าแรกเปรียบเทียบ 12 ผัง)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body { touch-action: none; overflow: hidden; }
        .draggable { touch-action: none; position: absolute; cursor: move; }
    </style>
</head>
<body class="bg-slate-100 w-screen h-screen flex flex-col p-4 font-sans select-none">

    <div class="bg-white p-4 rounded-xl shadow-sm mb-3 flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4 shrink-0">
        <div>
            <h1 class="text-xl font-bold text-gray-800">ระบบควบคุมและจัดผังพื้นที่ร่วมพิธี ส.1</h1>
            <p class="text-xs text-gray-500 mt-1">ติ๊กเลือก Checkbox เพื่อซ้อนแสดงผลผังตามพื้นที่ที่ต้องการประมวลผลพร้อมกัน</p>
        </div>
        
        <div class="flex flex-wrap items-center gap-2 w-full lg:w-auto bg-slate-50 p-2 rounded-xl border border-gray-200">
            <span class="text-xs font-bold text-gray-600 ml-1">💾 ส่งออกผังที่เลือก:</span>
            <button onclick="exportPNG()" class="bg-rose-600 hover:bg-rose-700 text-white font-medium text-xs px-3 py-1.5 rounded-lg shadow-sm">PNG</button>
            <button onclick="exportPDF()" class="bg-red-700 hover:bg-red-800 text-white font-medium text-xs px-3 py-1.5 rounded-lg shadow-sm">PDF</button>
            <button onclick="exportExcel()" class="bg-emerald-700 hover:bg-emerald-800 text-white font-medium text-xs px-3 py-1.5 rounded-lg shadow-sm">Excel</button>
            <button onclick="exportWord()" class="bg-blue-700 hover:bg-blue-800 text-white font-medium text-xs px-3 py-1.5 rounded-lg shadow-sm">Word</button>
        </div>
    </div>

    <div class="flex-1 flex flex-col md:flex-row gap-3 overflow-hidden">
        
        <div class="w-full md:w-80 bg-white border border-gray-200 rounded-2xl p-4 flex flex-col overflow-y-auto shrink-0 shadow-sm">
            <div class="flex justify-between items-center mb-3">
                <h2 class="text-sm font-bold text-gray-700 flex items-center gap-1">🗂️ รายการผังทั้งหมด</h2>
                <div class="flex gap-2">
                    <button onclick="toggleAllCheckboxes(true)" class="text-[10px] text-blue-600 font-bold hover:underline">เลือกทั้งหมด</button>
                    <button onclick="toggleAllCheckboxes(false)" class="text-[10px] text-gray-400 font-bold hover:underline">ล้าง</button>
                </div>
            </div>
            
            <div id="checkbox-container" class="space-y-1.5 flex-1">
                </div>
        </div>
        
        <div id="canvas-container" class="flex-1 bg-white border border-gray-200 rounded-2xl relative overflow-hidden shadow-inner flex flex-col">
            <div id="canvas" class="w-full flex-1 relative bg-white">
                <div class="absolute inset-0 bg-[linear-gradient(to_right,#f1f5f9_1px,transparent_1px),linear-gradient(to_bottom,#f1f5f9_1px,transparent_1px)] bg-[size:20px_20px]"></div>
            </div>
        </div>
    </div>

    <div id="input-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-lg w-full p-5 flex flex-col max-h-[80vh]">
            <h3 id="modal-target-title" class="text-lg font-bold text-gray-900 mb-2">📥 จัดการรายชื่อประจำผัง</h3>
            <p class="text-xs text-gray-500 mb-3">รูปแบบข้อมูล: <span class="font-mono bg-slate-100 p-0.5 rounded">เลขที่,ชื่อ-ตำแหน่ง,รหัสสี</span></p>
            <textarea id="raw-data-input" class="w-full flex-1 border border-gray-300 rounded-xl p-3 font-mono text-xs focus:ring-2 focus:ring-blue-500 outline-none resize-none"></textarea>
            <div class="mt-4 flex justify-end gap-2">
                <button onclick="toggleInputModal()" class="bg-gray-200 text-gray-700 text-xs font-bold px-4 py-2 rounded-lg">ยกเลิก</button>
                <button onclick="processInputData()" class="bg-blue-600 text-white text-xs font-bold px-4 py-2 rounded-lg">นำเข้าข้อมูล</button>
            </div>
        </div>
    </div>

    <script>
        // ข้อมูลตัวอย่างเริ่มต้นสำหรับ ผังที่ 1 เพื่อใช้เป็นแบบฟอร์มหลัก
        const sampleData = `10,ผบ.พัน.นร.รร.ส.สส.,#00a2e8
9,ผบ.พัน.ส.ชบช.เขตหลัง,#00a2e8
8,เสธ.ส.1,#00a2e8
7,หก.กผสป.สส.,#00a2e8
6,ผบ.ส.1 พัน.101,#00a2e8
5,ผบ.ส.1 พัน.102,#00a2e8
4,รอง ผบ.ส.1(2),#00a2e8
3,รอง ผบ.ส.1(1),#00a2e8
2,ผบ.ส.1,#00a2e8
9,คุณภัสร์ชลีรณณ์(แอมป์),#ff3399
8,น.ท.หญิงจุฑามาศ,#ff3399
7,คุณเกวลิน(เกว),#ff3399
6,คุณกฤตพร(แพร),#ff3399
5,คุณอังคนา(มุ่ย),#ff3399
4,คุณกฤตานนดา(ฝน),#ff3399
3,คุณศรินทรา(แก้ว),#ff3399
2,คุณพัชมณฑ์(น้ำหวาน),#ff3399
1,นายทหารเวร ส.1,#70c14a
,คุณจารุวรรณ(พี่หนิง),#bc00dd`;

        let activeEditKey = "";
        const canvas = document.getElementById('canvas');
        const checkboxContainer = document.getElementById('checkbox-container');

        // สร้าง Checkbox เมนูควบคุม 1-12 และฐานข้อมูลจำลองแยกชิ้นเด็ดขาด
        for(let i=1; i<=12; i++) {
            const key = `layout_${i}`;
            const labelText = `ผังที่ ${i} ${i===1?'(หน้า บก.ส.1)':''}`;
            
            // เตรียมฐานข้อมูลเบื้องต้น
            if(!localStorage.getItem(key)) {
                localStorage.setItem(key, JSON.stringify(parseRawData(i === 1 ? sampleData : `1,ตัวอย่างตำแหน่ง ผังที่ ${i},#00a2e8`, i)));
            }

            // สร้างแถวเมนูประกอบด้วย Checkbox และปุ่มฟันเฟืองสำหรับตั้งค่ารายชื่อ
            const row = document.createElement('div');
            row.className = "flex items-center justify-between p-2 rounded-xl hover:bg-slate-50 border border-transparent hover:border-slate-200 transition-all";
            
            row.innerHTML = `
                <label class="flex items-center gap-2.5 cursor-pointer w-full select-none text-xs font-semibold text-gray-700">
                    <input type="checkbox" value="${key}" ${i===1?'checked':''} onchange="renderCanvas()" class="w-4 h-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                    <span>${labelText}</span>
                </label>
                <button onclick="openEditModal('${key}', '${labelText}')" class="text-gray-400 hover:text-blue-600 text-xs font-bold p-1">⚙️ แก้ไขข้อมูล</button>
            `;
            checkboxContainer.appendChild(row);
        }

        function parseRawData(text, layoutNum) {
            let startY = 40;
            return text.split('\n').filter(line => line.trim() !== '').map((line, index) => {
                const parts = line.split(',');
                const isPink = parts[2]?.trim() === '#ff3399';
                return {
                    id: parts[0]?.trim() || '',
                    name: parts[1]?.trim() || '',
                    color: parts[2]?.trim() || '#00a2e8',
                    isPink: isPink,
                    // หากกระจายผัง 2-12 ให้ขยับพิกัดเริ่มต้นกระจายตัวไปเรื่อยๆ เพื่อไม่ให้ทับซ้อนจุดเดิมตอนเปิดพร้อมกัน
                    x: isPink ? 400 : 580 + (layoutNum * 10 - 10),
                    y: (startY + (index * 45)) % 550
                };
            });
        }

        // ประมวลผลดึงผังทั้งหมดที่มีการติ๊กถูก เอามาวาดซ้อนเลเยอร์บนแผ่นกระดานเดียวกัน
        function renderCanvas() {
            canvas.querySelectorAll('.draggable').forEach(el => el.remove());
            
            // ดึงค่าว่า Checkbox อันไหนโดนเปิดอยู่บ้าง
            const checkedBoxes = Array.from(checkboxContainer.querySelectorAll('input[type="checkbox"]:checked')).map(cb => cb.value);

            checkedBoxes.forEach(layoutKey => {
                const data = JSON.parse(localStorage.getItem(layoutKey)) || [];
                const layoutNum = layoutKey.split('_')[1];

                data.forEach((person) => {
                    const container = document.createElement('div');
                    // ใส่ Label จางๆ ระบุว่าเป็นตัวมาจากผังหมายเลขใดเพื่อไม่ให้สับสนตอนเปิดหลายผัง
                    container.className = 'draggable flex items-center gap-2 select-none z-10 bg-white/50 rounded-xl p-0.5 border border-transparent hover:border-blue-400';
                    container.style.left = person.x + 'px';
                    container.style.top = person.y + 'px';

                    const square = document.createElement('div');
                    square.className = `w-9 h-9 rounded-xl text-white flex items-center justify-center font-bold shadow-sm text-xs shrink-0`;
                    square.style.backgroundColor = person.color;
                    square.innerText = person.id;

                    const label = document.createElement('div');
                    label.className = 'bg-white/95 backdrop-blur-xs px-2 py-1 rounded-lg shadow-xs border border-gray-200 text-[11px] font-bold text-gray-800 whitespace-nowrap';
                    label.innerHTML = `${person.name} <span class="text-[9px] text-gray-400 font-normal">(ผัง ${layoutNum})</span>`;

                    if (person.isPink) {
                        container.appendChild(label); container.appendChild(square);
                    } else {
                        container.appendChild(square); container.appendChild(label);
                    }

                    canvas.appendChild(container);

                    // ระบบลากวางประมวลผลพิกัดแบบมัลติเลเยอร์สัมผัส iPad
                    let isDragging = false; let startX, startY;
                    function startDrag(e) {
                        isDragging = true;
                        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                        startX = clientX - container.offsetLeft;
                        startY = clientY - container.offsetTop;
                        container.style.zIndex = 100;
                    }
                    function doDrag(e) {
                        if (!isDragging) return;
                        e.preventDefault();
                        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                        let newX = clientX - startX; let newY = clientY - startY;
                        
                        container.style.left = newX + 'px'; container.style.top = newY + 'px';
                        person.x = newX; person.y = newY;
                    }
                    function stopDrag() {
                        if(!isDragging) return;
                        isDragging = false; container.style.zIndex = 10;
                        // เซฟพิกัดใหม่บันทึกแยกเข้าฐานข้อมูลผังนั้นโดยตรง
                        localStorage.setItem(layoutKey, JSON.stringify(data));
                    }

                    container.addEventListener('mousedown', startDrag);
                    document.addEventListener('mousemove', doDrag);
                    document.addEventListener('mouseup', stopDrag);
                    container.addEventListener('touchstart', startDrag, { passive: false });
                    document.addEventListener('touchmove', doDrag, { passive: false });
                    document.addEventListener('touchend', stopDrag);
                });
            });
        }

        // ปุ่มควบคุม Checkbox ทั้งหมดในคลิกเดียว
        function toggleAllCheckboxes(status) {
            checkboxContainer.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = status);
            renderCanvas();
        }

        // คอนโทรลหน้าต่างเปิดรับข้อมูล
        function openEditModal(key, title) {
            activeEditKey = key;
            document.getElementById('modal-target-title').innerText = `📥 แก้ไขข้อมูลรายชื่อ: ${title}`;
            const data = JSON.parse(localStorage.getItem(key)) || [];
            document.getElementById('raw-data-input').value = data.map(p => `${p.id},${p.name},${p.color}`).join('\n');
            document.getElementById('input-modal').classList.remove('hidden');
        }
        function toggleInputModal() { document.getElementById('input-modal').classList.add('hidden'); }
        function processInputData() {
            const txt = document.getElementById('raw-data-input').value;
            const layoutNum = activeEditKey.split('_')[1];
            localStorage.setItem(activeEditKey, JSON.stringify(parseRawData(txt, parseInt(layoutNum))));
            toggleInputModal(); renderCanvas();
        }

        // ================== ระบบประมวลผลการส่งออกไฟล์ข้อมูลรวมเลเยอร์ ==================
        function getActiveLayoutNames() {
            return Array.from(checkboxContainer.querySelectorAll('input[type="checkbox"]:checked'))
                .map(cb => cb.parentElement.innerText.trim()).join(' & ');
        }

        function exportPNG() {
            html2canvas(canvas, { scale: 2 }).then(img => {
                const a = document.createElement('a'); a.download = `ผังรวม_${getActiveLayoutNames()}.png`;
                a.href = img.toDataURL('image/png'); a.click();
            });
        }

        function exportPDF() {
            html2canvas(canvas, { scale: 1.5 }).then(imgCanvas => {
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('l', 'px', [canvas.clientWidth, canvas.clientHeight]);
                pdf.addImage(imgCanvas.toDataURL('image/png'), 'PNG', 0, 0, canvas.clientWidth, canvas.clientHeight);
                pdf.save(`ผังรวม_${getActiveLayoutNames()}.pdf`);
            });
        }

        function exportExcel() {
            const checkedBoxes = Array.from(checkboxContainer.querySelectorAll('input[type="checkbox"]:checked')).map(cb => cb.value);
            const wb = XLSX.utils.book_new();
            
            checkedBoxes.forEach(layoutKey => {
                const data = JSON.parse(localStorage.getItem(layoutKey)) || [];
                const rows = data.map(p => ({ "ลำดับ/หมายเลข": p.id, "ชื่อ-ตำแหน่ง": p.name, "รหัสสีฟอร์ม": p.color, "พิกัดแกน X": p.x, "พิกัดแกน Y": p.y }));
                const ws = XLSX.utils.json_to_sheet(rows);
                XLSX.utils.book_append_sheet(wb, ws, `ผังที่ ${layoutKey.split('_')[1]}`);
            });
            XLSX.writeFile(wb, "รายงานรวมพิกัดกำลังพล_12ผัง.xlsx");
        }

        function exportWord() {
            const checkedBoxes = Array.from(checkboxContainer.querySelectorAll('input[type="checkbox"]:checked')).map(cb => cb.value);
            let combinedContent = "";

            checkedBoxes.forEach(layoutKey => {
                const data = JSON.parse(localStorage.getItem(layoutKey)) || [];
                const layoutNum = layoutKey.split('_')[1];
                let tableRows = data.map(p => `<tr><td style="border:1px solid #ccc;padding:6px;text-align:center;">${p.id || '-'}</td><td style="border:1px solid #ccc;padding:6px;">${p.name}</td><td style="border:1px solid #ccc;padding:6px;text-align:center;">${p.color}</td></tr>`).join('');
                
                combinedContent += `
                    <h3>📌 ข้อมูลกำลังพลประจำ: ผังที่ ${layoutNum}</h3>
                    <table style="width:100%;border-collapse:collapse;margin-bottom:20px;">
                        <thead><tr style="background:#f2f2f2;"><th style="border:1px solid #ccc;padding:6px;width:15%">หมายเลข</th><th style="border:1px solid #ccc;padding:6px;text-align:left;">รายชื่อ / ตำแหน่งภารกิจ</th><th style="border:1px solid #ccc;padding:6px;width:20%">รหัสสี</th></tr></thead>
                        <tbody>${tableRows}</tbody>
                    </table><hr/>`;
            });

            const htmlContent = `
                <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                <body><h2>รายงานข้อมูลรวมระบบผังพื้นที่พิธี ส.1</h2>${combinedContent}</body>
                </html>`;

            const blob = new Blob(['\ufeff' + htmlContent], { type: 'application/msword' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = "รายงานผังรวมชุดปฏิบัติการ.doc"; a.click();
        }

        // เริ่มทำงานวาดโครงสร้างแรกบนหน้าจอ iPad
        renderCanvas();
    </script>
</body>
</html>
