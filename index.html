<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบบริหารจัดการผังต้อนรับและภารกิจ ส.1</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body { touch-action: none; overflow: hidden; }
        .draggable { touch-action: none; position: absolute; cursor: move; }
    </style>
</head>
<body class="bg-slate-100 w-screen h-screen flex flex-col p-4 font-sans select-none">

    <div class="bg-white p-4 rounded-xl shadow-sm mb-3 flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4 shrink-0">
        <div>
            <h1 class="text-xl font-bold text-gray-800">ระบบควบคุมและจัดผังภารกิจร่วมพิธี ส.1</h1>
            <p class="text-xs text-gray-500 mt-1">เลือก Checkbox หน้าภารกิจเพื่อแสดงผัง และสามารถกดตั้งค่าเพื่ออัปโหลดไฟล์ Excel ของผังนั้น ๆ ได้</p>
        </div>
        
        <div class="flex flex-wrap items-center gap-2 w-full lg:w-auto bg-slate-50 p-2 rounded-xl border border-gray-200">
            <span class="text-xs font-bold text-gray-600 ml-1">💾 ส่งออกผังที่เลือก:</span>
            <button onclick="exportPNG()" class="bg-rose-600 hover:bg-rose-700 text-white font-medium text-xs px-3 py-1.5 rounded-lg shadow-sm">PNG</button>
            <button onclick="exportPDF()" class="bg-red-700 hover:bg-red-800 text-white font-medium text-xs px-3 py-1.5 rounded-lg shadow-sm">PDF</button>
            <button onclick="exportExcel()" class="bg-emerald-700 hover:bg-emerald-800 text-white font-medium text-xs px-3 py-1.5 rounded-lg shadow-sm">Excel</button>
            <button onclick="exportWord()" class="bg-blue-700 hover:bg-blue-800 text-white font-medium text-xs px-3 py-1.5 rounded-lg shadow-sm">Word</button>
        </div>
    </div>

    <div class="flex-1 flex flex-col md:flex-row gap-3 overflow-hidden">
        
        <div class="w-full md:w-96 bg-white border border-gray-200 rounded-2xl p-4 flex flex-col overflow-y-auto shrink-0 shadow-sm">
            <div class="flex justify-between items-center mb-3">
                <h2 class="text-sm font-bold text-gray-700 flex items-center gap-1">📋 รายการภารกิจ/พิธีการ</h2>
                <div class="flex gap-2">
                    <button onclick="toggleAllCheckboxes(true)" class="text-[10px] text-blue-600 font-bold hover:underline">เลือกทั้งหมด</button>
                    <button onclick="toggleAllCheckboxes(false)" class="text-[10px] text-gray-400 font-bold hover:underline">ล้าง</button>
                </div>
            </div>
            
            <div id="checkbox-container" class="space-y-1 flex-1 pr-1">
                </div>
        </div>
        
        <div id="canvas-container" class="flex-1 bg-white border border-gray-200 rounded-2xl relative overflow-hidden shadow-inner flex flex-col">
            <div id="canvas" class="w-full flex-1 relative bg-white">
                <div class="absolute inset-0 bg-[linear-gradient(to_right,#f1f5f9_1px,transparent_1px),linear-gradient(to_bottom,#f1f5f9_1px,transparent_1px)] bg-[size:20px_20px]"></div>
            </div>
        </div>
    </div>

    <div id="input-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-lg w-full p-5 flex flex-col max-h-[80vh]">
            <h3 id="modal-target-title" class="text-lg font-bold text-gray-900 mb-1">📥 จัดการรายชื่อประจำผัง</h3>
            
            <div class="mt-2 p-3 bg-emerald-50 rounded-xl border border-emerald-200 mb-3">
                <label class="block text-xs font-bold text-emerald-800 mb-1">📊 นำเข้าผ่านไฟล์ Excel (.xlsx, .xls):</label>
                <input type="file" id="excel-file-input" accept=".xlsx, .xls" onchange="importExcelFile(event)" class="block w-full text-xs text-gray-500 file:mr-4 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:text-xs file:font-bold file:bg-emerald-600 file:text-white hover:file:bg-emerald-700 cursor-pointer" />
                <p class="text-[10px] text-emerald-700 mt-1">* ตั้งชื่อหัวตารางใน Excel เป็น: <span class="font-bold">หมายเลข</span>, <span class="font-bold">ชื่อ</span>, <span class="font-bold">สี</span></p>
            </div>

            <div class="relative flex py-2 items-center">
                <div class="flex-grow border-t border-gray-200"></div>
                <span class="flex-shrink mx-4 text-gray-400 text-[10px] font-bold">หรือแก้ไขด้วยข้อความตรงนี้</span>
                <div class="flex-grow border-t border-gray-200"></div>
            </div>

            <textarea id="raw-data-input" class="w-full flex-1 border border-gray-300 rounded-xl p-3 font-mono text-xs focus:ring-2 focus:ring-blue-500 outline-none resize-none min-h-[150px]"></textarea>
            
            <div class="mt-4 flex justify-end gap-2">
                <button onclick="toggleInputModal()" class="bg-gray-200 text-gray-700 text-xs font-bold px-4 py-2 rounded-lg">ยกเลิก</button>
                <button onclick="processInputData()" class="bg-blue-600 text-white text-xs font-bold px-4 py-2 rounded-lg">บันทึกข้อมูล</button>
            </div>
        </div>
    </div>

    <script>
        const missionList = [
            "ต้อนรับหน้าพระอนุสาวรีย์", "สักการะพระอนุสาวรีย์", "ถ่ายภาพหน้าพระอนุสาวรีย์",
            "ต้อนรับหน้า บก.ส.1", "รับเคารพจากแถวทหารต้อนรับ", "ห้องบุรฉัตร", "ห้องประชุม",
            "ประดับเข็มบุรฉัตร อาคารอเนกประสงค์", "ประดับเข็มบุรฉัตรห้องเกียรติยศ", "ประดับยศ",
            "รายงายตัวเข้า", "รายงานตัวออก", "ลาอุปสมบท", "ถ่ายภาพหน้า สนง.", "ลงนามสมุดเยี่ยม",
            "เยี่ยมบุตรพิเศษ ส.1", "ถ่ายภาพเยี่ยมบุตรพิเศษ ส.1", "เยี่ยมบุตรพิเศษ ส.1 พัน.101",
            "ถ่ายภาพเยี่ยมบุตรพิเศษ ส.1 พัน.101", "เยี่ยมบุตรพิเศษ ส.1 พัน.102", "ถ่ายภาพเยี่ยมบุตรพิเศษ ส.1 พัน.102",
            "เยี่ยมบุตรพิเศษ พัน.ส.ซบร.เขตหลัง", "ถ่ายภาพเยี่ยมบุตรพิเศษ พัน.ส.ซบร.เขตหลัง",
            "เยี่ยมบุตรพิเศษ พัน.นร.รร.ส.สส.", "ถ่ายภาพเยี่ยมบุตรพิเศษ พัน.นร.รร.ส.สส.", "พิธีอื่นๆ(……)"
        ];

        const sampleBaseData = `10,ผบ.พัน.นร.รร.ส.สส.,#00a2e8
9,ผบ.พัน.ส.ชบช.เขตหลัง,#00a2e8
8,เสธ.ส.1,#00a2e8
7,หก.กผสป.สส.,#00a2e8
6,ผบ.ส.1 พัน.101,#00a2e8
5,ผบ.ส.1 พัน.102,#00a2e8
4,รอง ผบ.ส.1(2),#00a2e8
3,รอง ผบ.ส.1(1),#00a2e8
2,ผบ.ส.1,#00a2e8
9,คุณภัสร์ชลีรณณ์(แอมป์),#ff3399
8,น.ท.หญิงจุฑามาศ,#ff3399
7,คุณเกวลิน(เกว),#ff3399
6,คุณกฤตพร(แพร),#ff3399
5,คุณอังคนา(มุ่ย),#ff3399
4,คุณกฤตานนดา(ฝน),#ff3399
3,คุณศรินทรา(แก้ว),#ff3399
2,คุณพัชมณฑ์(น้ำหวาน),#ff3399
1,นายทหารเวร ส.1,#70c14a
,คุณจารุวรรณ(พี่หนิง),#bc00dd`;

        let activeEditKey = "";
        const canvas = document.getElementById('canvas');
        const checkboxContainer = document.getElementById('checkbox-container');

        function parseRawData(text, shiftFactor) {
            let startY = 40;
            return text.split('\n').filter(line => line.trim() !== '').map((line, index) => {
                const parts = line.split(',');
                const isPink = parts[2]?.trim() === '#ff3399';
                return {
                    id: parts[0]?.trim() || '',
                    name: parts[1]?.trim() || '',
                    color: parts[2]?.trim() || '#00a2e8',
                    isPink: isPink,
                    x: isPink ? 380 : 560 + (shiftFactor * 5 % 60),
                    y: (startY + (index * 42) + (shiftFactor * 5)) % 540
                };
            });
        }

        missionList.forEach((missionName, index) => {
            const key = `mission_layout_${index + 1}`;
            if (!localStorage.getItem(key)) {
                const initialText = (index < 1) ? sampleBaseData : `1,กำลังพลหลักภารกิจ (${missionName}),#70c14a`;
                localStorage.setItem(key, JSON.stringify(parseRawData(initialText, index)));
            }
            const isChecked = index === 0 ? 'checked' : '';
            const row = document.createElement('div');
            row.className = "flex items-center justify-between p-2 rounded-xl hover:bg-slate-50 border border-transparent hover:border-slate-200 transition-all";
            row.innerHTML = `
                <label class="flex items-center gap-2.5 cursor-pointer w-full select-none text-xs font-semibold text-gray-700 pr-2">
                    <input type="checkbox" value="${key}" ${isChecked} onchange="renderCanvas()" class="w-4 h-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500 shrink-0">
                    <span class="break-words max-w-[180px] sm:max-w-none">${missionName}</span>
                </label>
                <button onclick="openEditModal('${key}', '${missionName}')" class="text-gray-400 hover:text-blue-600 text-xs font-bold p-1 shrink-0">⚙️ ตั้งค่า</button>
            `;
            checkboxContainer.appendChild(row);
        });

        function renderCanvas() {
            canvas.querySelectorAll('.draggable').forEach(el => el.remove());
            const checkedBoxes = Array.from(checkboxContainer.querySelectorAll('input[type="checkbox"]:checked')).map(cb => cb.value);

            checkedBoxes.forEach(layoutKey => {
                const data = JSON.parse(localStorage.getItem(layoutKey)) || [];
                const cbElement = checkboxContainer.querySelector(`input[value="${layoutKey}"]`);
                const missionName = cbElement ? cbElement.parentElement.innerText.trim() : "";

                data.forEach((person) => {
                    const container = document.createElement('div');
                    container.className = 'draggable flex items-center gap-2 select-none z-10 bg-white/40 rounded-xl p-0.5 border border-transparent hover:border-blue-500';
                    container.style.left = person.x + 'px';
                    container.style.top = person.y + 'px';

                    const square = document.createElement('div');
                    square.className = `w-9 h-9 rounded-xl text-white flex items-center justify-center font-bold shadow-sm text-xs shrink-0`;
                    square.style.backgroundColor = person.color;
                    square.innerText = person.id;

                    const label = document.createElement('div');
                    label.className = 'bg-white/95 backdrop-blur-xs px-2.5 py-1.5 rounded-lg shadow-xs border border-gray-200 text-[11px] font-bold text-gray-800 whitespace-nowrap';
                    label.innerHTML = `${person.name} <span class="text-[9px] text-gray-400 font-normal">(${missionName.substring(0, 8)}...)</span>`;

                    if (person.isPink) {
                        container.appendChild(label); container.appendChild(square);
                    } else {
                        container.appendChild(square); container.appendChild(label);
                    }

                    canvas.appendChild(container);

                    let isDragging = false; let startX, startY;
                    function startDrag(e) {
                        isDragging = true;
                        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                        startX = clientX - container.offsetLeft;
                        startY = clientY - container.offsetTop;
                        container.style.zIndex = 100;
                    }
                    function doDrag(e) {
                        if (!isDragging) return;
                        e.preventDefault();
                        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                        let newX = clientX - startX; let newY = clientY - startY;
                        container.style.left = newX + 'px'; container.style.top = newY + 'px';
                        person.x = newX; person.y = newY;
                    }
                    function stopDrag() {
                        if(!isDragging) return;
                        isDragging = false; container.style.zIndex = 10;
                        localStorage.setItem(layoutKey, JSON.stringify(data));
                    }

                    container.addEventListener('mousedown', startDrag);
                    document.addEventListener('mousemove', doDrag);
                    document.addEventListener('mouseup', stopDrag);
                    container.addEventListener('touchstart', startDrag, { passive: false });
                    document.addEventListener('touchmove', doDrag, { passive: false });
                    document.addEventListener('touchend', stopDrag);
                });
            });
        }

        // ฟังก์ชันระบบอ่านไฟล์ Excel และประมวลผลคำนวณตำแหน่ง
        function importExcelFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                
                // แปลงข้อมูลชีตออกมาเป็นคู่ Object array JSON
                const jsonData = XLSX.utils.sheet_to_json(worksheet);
                
                if(jsonData.length === 0) {
                    alert('ไม่พบข้อมูลรายชื่อในไฟล์ Excel หรือรูปแบบไฟล์ไม่ถูกต้อง');
                    return;
                }

                // ดึงข้อมูลมาแปลงให้อยู่ในฟอร์แมตข้อความดิบเพื่อใส่ในกล่องข้อความ
                let textFormatted = jsonData.map(row => {
                    // ค้นหาคอลัมน์ไม่ว่าจะพิมพ์เล็กหรือพิมพ์ใหญ่
                    const id = row['หมายเลข'] || row['id'] || row['ID'] || '';
                    const name = row['ชื่อ'] || row['name'] || row['Name'] || '';
                    const color = row['สี'] || row['color'] || row['Color'] || '#00a2e8';
                    return `${id},${name},${color}`;
                }).join('\n');

                document.getElementById('raw-data-input').value = textFormatted;
            };
            reader.readAsArrayBuffer(file);
        }

        function toggleAllCheckboxes(status) {
            checkboxContainer.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = status);
            renderCanvas();
        }

        function openEditModal(key, title) {
            activeEditKey = key;
            document.getElementById('excel-file-input').value = ""; // เคลียร์ไฟล์เก่าออก
            document.getElementById('modal-target-title').innerText = `📥 จัดการข้อมูล: ${title}`;
            const data = JSON.parse(localStorage.getItem(key)) || [];
            document.getElementById('raw-data-input').value = data.map(p => `${p.id},${p.name},${p.color}`).join('\n');
            document.getElementById('input-modal').classList.remove('hidden');
        }
        
        function toggleInputModal() { document.getElementById('input-modal').classList.add('hidden'); }
        
        function processInputData() {
            const txt = document.getElementById('raw-data-input').value;
            localStorage.setItem(activeEditKey, JSON.stringify(parseRawData(txt, 1)));
            toggleInputModal(); renderCanvas();
        }

        // ================== ระบบส่งออกไฟล์ตามเดิม ==================
        function getSelectedMissionsName() {
            const checkedCount = checkboxContainer.querySelectorAll('input[type="checkbox"]:checked').length;
            return checkedCount === 1 ? checkboxContainer.querySelector('input[type="checkbox"]:checked').parentElement.innerText.trim() : `รวม_${checkedCount}_ภารกิจ`;
        }
        function exportPNG() { html2canvas(canvas, { scale: 2 }).then(img => { const a = document.createElement('a'); a.download = `ผัง_${getSelectedMissionsName()}.png`; a.href = img.toDataURL('image/png'); a.click(); }); }
        function exportPDF() { html2canvas(canvas, { scale: 1.5 }).then(imgCanvas => { const { jsPDF } = window.jspdf; const pdf = new jsPDF('l', 'px', [canvas.clientWidth, canvas.clientHeight]); pdf.addImage(imgCanvas.toDataURL('image/png'), 'PNG', 0, 0, canvas.clientWidth, canvas.clientHeight); pdf.save(`ผังภารกิจ_${getSelectedMissionsName()}.pdf`); }); }
        function exportExcel() {
            const checkedBoxes = Array.from(checkboxContainer.querySelectorAll('input[type="checkbox"]:checked')).map(cb => cb.value);
            const wb = XLSX.utils.book_new();
            checkedBoxes.forEach(layoutKey => {
                const data = JSON.parse(localStorage.getItem(layoutKey)) || [];
                const cbElement = checkboxContainer.querySelector(`input[value="${layoutKey}"]`);
                const ws = XLSX.utils.json_to_sheet(data.map(p => ({ "หมายเลข": p.id, "ชื่อ": p.name, "สี": p.color, "X": p.x, "Y": p.y })));
                XLSX.utils.book_append_sheet(wb, ws, (cbElement ? cbElement.parentElement.innerText.trim() : "ภารกิจ").substring(0, 25));
            });
            XLSX.writeFile(wb, "รายงานผังรายชื่อกำลังพล_ส1.xlsx");
        }
        function exportWord() {
            const checkedBoxes = Array.from(checkboxContainer.querySelectorAll('input[type="checkbox"]:checked')).map(cb => cb.value);
            let combinedContent = "";
            checkedBoxes.forEach(layoutKey => {
                const data = JSON.parse(localStorage.getItem(layoutKey)) || [];
                const cbElement = checkboxContainer.querySelector(`input[value="${layoutKey}"]`);
                let tableRows = data.map(p => `<tr><td style="border:1px solid #ccc;padding:6px;text-align:center;">${p.id || '-'}</td><td style="border:1px solid #ccc;padding:6px;">${p.name}</td><td style="border:1px solid #ccc;padding:6px;text-align:center;">${p.color}</td></tr>`).join('');
                combinedContent += `<h3>📌 ภารกิจ: ${cbElement ? cbElement.parentElement.innerText.trim() : ""}</h3><table style="width:100%;border-collapse:collapse;margin-bottom:25px;"><thead><tr style="background:#f2f2f2;"><th style="border:1px solid #ccc;padding:6px;width:15%">หมายเลข</th><th style="border:1px solid #ccc;padding:6px;text-align:left;">ยศ นาม ตำแหน่ง</th><th style="border:1px solid #ccc;padding:6px;width:20%">รหัสสี</th></tr></thead><tbody>${tableRows}</tbody></table><hr/>`;
            });
            const blob = new Blob(['\ufeff' + `<html><body><h2>เอกสารรายงานผัง ส.1</h2>${combinedContent}</body></html>`], { type: 'application/msword' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "รายงานผังกำลังพล.doc"; a.click();
        }

        renderCanvas();
    </script>
</body>
</html>
