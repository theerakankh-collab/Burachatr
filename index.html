<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบควบคุมและจัดผังภารกิจร่วมพิธี ส.1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        
        <header class="header-section">
            <div class="title-area">
                <h1>ระบบควบคุมและจัดผังภารกิจร่วมพิธี ส.1</h1>
                <p>เลือก Checkbox เพื่อจัดการผัง หรือใช้ระบบนำเข้า Excel ด้านขวาเพื่ออัปเดตข้อมูล</p>
            </div>
            <div class="action-buttons">
                <button class="btn btn-excel-import">📥 นำเข้า Excel</button>
                <button class="btn btn-png">PNG</button>
                <button class="btn btn-pdf">PDF</button>
                <button class="btn btn-excel">Excel</button>
                <button class="btn btn-word">Word</button>
            </div>
        </header>

        <section class="top-selection-section">
            <div class="section-title">
                <span>📋 รายการภารกิจ / พิธีการทั้งหมด</span>
                <div class="selection-controls">
                    <a href="#" id="selectAll">เลือกทั้งหมด</a>
                    <a href="#" id="clearAll">ล้าง</a>
                </div>
            </div>
            
            <div class="checkbox-grid">
                <label class="checkbox-item"><input type="checkbox" checked> ต้อนรับหน้าพระอนุสาวรีย์</label>
                <label class="checkbox-item"><input type="checkbox" checked> สักการะพระอนุสาวรีย์</label>
                <label class="checkbox-item"><input type="checkbox"> ถ่ายภาพหน้าพระอนุสาวรีย์</label>
                <label class="checkbox-item"><input type="checkbox" checked> ต้อนรับหน้า บก.ส.1</label>
                <label class="checkbox-item"><input type="checkbox"> รับเคารพจากแถวทหารต้อนรับ</label>
                <label class="checkbox-item"><input type="checkbox"> ห้องบุรฉัตร</label>
                <label class="checkbox-item"><input type="checkbox"> ห้องประชุม</label>
                <label class="checkbox-item"><input type="checkbox"> ประดับเข็มบุรฉัตร อาคารอเนกประสงค์</label>
                <label class="checkbox-item"><input type="checkbox"> ประดับเข็มบุรฉัตรห้องเกียรติยศ</label>
                <label class="checkbox-item"><input type="checkbox"> ประดับยศ</label>
            </div>
        </section>

        <section class="bottom-grid-section">
            <div class="section-title">
                <span>🗂️ รายชื่อผังที่เลือกดำเนินการ (Grid View)</span>
            </div>

            <div class="selected-grid"></div>
        </section>

    </div>

    <script src="js/app.js"></script>
</body>
</html>
