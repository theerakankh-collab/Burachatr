<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>โปรแกรมจัดผังต้อนรับ บก.ส.1</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { touch-action: none; overflow: hidden; }
        .draggable { touch-action: none; position: absolute; cursor: move; }
    </style>
</head>
<body class="bg-slate-100 w-screen h-screen flex flex-col p-4 font-sans select-none">

    <div class="bg-white p-4 rounded-xl shadow-sm mb-3 flex justify-between items-center shrink-0">
        <div>
            <h1 class="text-lg font-bold text-gray-800">ผังการต้อนรับ บริเวณ หน้า บก.ส.1</h1>
            <p class="text-xs text-gray-500">ลากวางบล็อกสี่เหลี่ยมเพื่อจัดตำแหน่ง รองรับการสัมผัสบน iPad เต็มรูปแบบ</p>
        </div>
        <span class="bg-blue-50 text-blue-700 text-xs font-semibold px-2.5 py-1 rounded-full border border-blue-200">v1.0 สมบูรณ์</span>
    </div>

    <div id="canvas" class="flex-1 bg-white border border-gray-200 rounded-2xl relative overflow-hidden shadow-inner">
        <div class="absolute inset-0 bg-[linear-gradient(to_right,#f1f5f9_1px,transparent_1px),linear-gradient(to_bottom,#f1f5f9_1px,transparent_1px)] bg-[size:20px_20px]"></div>
    </div>

    <div class="mt-3 p-3 bg-white rounded-xl shadow-sm flex gap-3 justify-center shrink-0 z-50">
        <button onclick="exportToPNG()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium text-sm px-5 py-2 rounded-lg shadow-sm active:scale-95 transition-transform flex items-center gap-2">
            📷 บันทึกเป็นรูปภาพ (PNG)
        </button>
        <button onclick="resetLayout()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium text-sm px-5 py-2 rounded-lg active:scale-95 transition-transform">
            🔄 รีเซ็ตตำแหน่งเริ่มต้น
        </button>
    </div>

    <script>
        // ข้อมูลตำแหน่งตัวเลขและรายชื่อทั้งหมดอ้างอิงตามภาพตัวอย่างสี่เหลี่ยมจัตุรัส
        const defaultPersonnel = [
            // ฝั่งผู้บังคับบัญชาและหน่วยขึ้นตรง (สีฟ้า)
            { id: '10', name: 'ผบ.พัน.นร.รร.ส.สส.', color: 'bg-[#00a2e8]', x: 620, y: 40 },
            { id: '9', name: 'ผบ.พัน.ส.ชบช.เขตหลัง', color: 'bg-[#00a2e8]', x: 620, y: 100 },
            { id: '8', name: 'เสธ.ส.1', color: 'bg-[#00a2e8]', x: 620, y: 160 },
            { id: '7', name: 'หก.กผสป.สส.', color: 'bg-[#00a2e8]', x: 620, y: 220 },
            { id: '6', name: 'ผบ.ส.1 พัน.101', color: 'bg-[#00a2e8]', x: 620, y: 280 },
            { id: '5', name: 'ผบ.ส.1 พัน.102', color: 'bg-[#00a2e8]', x: 620, y: 340 },
            { id: '4', name: 'รอง ผบ.ส.1(2)', color: 'bg-[#00a2e8]', x: 620, y: 400 },
            { id: '3', name: 'รอง ผบ.ส.1(1)', color: 'bg-[#00a2e8]', x: 620, y: 460 },
            { id: '2', name: 'ผบ.ส.1', color: 'bg-[#00a2e8]', x: 300, y: 460 },
            
            // ฝั่งเจ้าหน้าที่/ผู้ติดตาม (สีชมพู)
            { id: '9', name: 'คุณภัสร์ชลีรณณ์(แอมป์)', color: 'bg-[#ff3399]', isPink: true, x: 400, y: 100 },
            { id: '8', name: 'น.ท.หญิงจุฑามาศ', color: 'bg-[#ff3399]', isPink: true, x: 400, y: 160 },
            { id: '7', name: 'คุณเกวลิน(เกว)', color: 'bg-[#ff3399]', isPink: true, x: 400, y: 220 },
            { id: '6', name: 'คุณกฤตพร(แพร)', color: 'bg-[#ff3399]', isPink: true, x: 400, y: 280 },
            { id: '5', name: 'คุณอังคนา(มุ่ย)', color: 'bg-[#ff3399]', isPink: true, x: 400, y: 340 },
            { id: '4', name: 'คุณกฤตานนดา(ฝน)', color: 'bg-[#ff3399]', isPink: true, x: 400, y: 400 },
            { id: '3', name: 'คุณศรินทรา(แก้ว)', color: 'bg-[#ff3399]', isPink: true, x: 400, y: 460 },
            { id: '2', name: 'คุณพัชมณฑ์(น้ำหวาน)', color: 'bg-[#ff3399]', isPink: true, x: 80, y: 460 },
            
            // นายทหารเวร (สีเขียว)
            { id: '1', name: 'นายทหารเวร ส.1', color: 'bg-[#70c14a]', x: 300, y: 520 },
            
            // หน่วยสนับสนุนอื่นๆ (สีม่วง)
            { id: '', name: 'คุณจารุวรรณ(พี่หนิง)', color: 'bg-[#bc00dd]', isPurple: true, x: 300, y: 590 }
        ];

        const canvas = document.getElementById('canvas');

        function renderElements(data) {
            canvas.querySelectorAll('.draggable').forEach(el => el.remove());

            data.forEach(person => {
                const container = document.createElement('div');
                container.className = 'draggable flex items-center gap-3 select-none z-10';
                container.style.left = person.x + 'px';
                container.style.top = person.y + 'px';

                // สี่เหลี่ยมจัตุรัสแสดงหมายเลข (ตามสั่ง)
                const square = document.createElement('div');
                // หากเป็นสีม่วงพี่หนิงที่ไม่มีเลข ให้ทำเป็นสี่เหลี่ยมเปล่าขนาดเท่ากัน
                square.className = `w-10 h-10 rounded-xl ${person.color} text-white flex items-center justify-center font-bold shadow-md text-sm shrink-0`;
                square.innerText = person.id;

                // ข้อความชื่อตำแหน่ง
                const label = document.createElement('div');
                label.className = 'bg-white/90 backdrop-blur-xs px-3 py-1.5 rounded-lg shadow-sm border border-gray-200 text-xs font-bold text-gray-800 whitespace-nowrap';
                label.innerText = person.name;

                // จัดเรียงทิศทางไอคอนสี่เหลี่ยม: หากเป็นบล็อกฝั่งชมพูให้สี่เหลี่ยมอยู่ขวา ชื่ออยู่ซ้าย ตามแบบรูปเป๊ะๆ
                if (person.isPink) {
                    container.appendChild(label);
                    container.appendChild(square);
                } else {
                    container.appendChild(square);
                    container.appendChild(label);
                }

                canvas.appendChild(container);

                // ระบบควบคุมการ Drag & Drop บน iPad หน้าจอสัมผัส
                let isDragging = false;
                let startX, startY;

                function startDrag(e) {
                    isDragging = true;
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                    
                    startX = clientX - container.offsetLeft;
                    startY = clientY - container.offsetTop;
                    container.style.zIndex = 50; 
                }

                function doDrag(e) {
                    if (!isDragging) return;
                    e.preventDefault();
                    
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                    
                    let newX = clientX - startX;
                    let newY = clientY - startY;

                    // ล็อกขอบเขตไม่ให้ลากหลุดออกนอกตารางกระดาน
                    const maxW = canvas.clientWidth - container.clientWidth;
                    const maxH = canvas.clientHeight - container.clientHeight;
                    newX = Math.max(10, Math.min(newX, maxW - 10));
                    newY = Math.max(10, Math.min(newY, maxH - 10));

                    container.style.left = newX + 'px';
                    container.style.top = newY + 'px';
                }

                function stopDrag() {
                    isDragging = false;
                    container.style.zIndex = 10;
                }

                container.addEventListener('mousedown', startDrag);
                document.addEventListener('mousemove', doDrag);
                document.addEventListener('mouseup', stopDrag);

                container.addEventListener('touchstart', startDrag, { passive: false });
                document.addEventListener('touchmove', doDrag, { passive: false });
                document.addEventListener('touchend', stopDrag);
            });
        }

        // ฟังก์ชันสั่ง Export พื้นที่จัดผังออกมาเป็นรูปภาพบันทึกลงเครื่อง
        function exportToPNG() {
            const toolBar = document.querySelector('.mt-3');
            toolBar.style.display = 'none'; // ซ่อนปุ่มกดชั่วคราวขณะถ่ายภาพ
            
            html2canvas(document.body, { scale: 2 }).then(canvasImage => {
                const link = document.createElement('a');
                link.download = 'ผังการต้อนรับ_หน้า_บก.ส.1.png';
                link.href = canvasImage.toDataURL('image/png');
                link.click();
                toolBar.style.display = 'flex'; // ดึงปุ่มกดกลับมา
            });
        }

        // ฟังก์ชันรีเซ็ตกลับค่าตำแหน่งเดิม
        function resetLayout() {
            renderElements(defaultPersonnel);
        }

        // สั่งรันครั้งแรกเมื่อโหลดหน้าเว็บ
        renderElements(defaultPersonnel);
    </script>
</body>
</html>
